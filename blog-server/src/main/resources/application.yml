server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/pidan_blog
    username: pidan_blog
    password: blog_password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

blog:
  jwt:
    secret: pidan-blog-jwt-secret-key-change-in-production-2024
    expiration: 604800000
  upload:
    path: ./uploads

management:
  endpoints:
    web:
      exposure:
        include: health,info
